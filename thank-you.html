<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lakshya Academy | Thank You</title>
  <style>
    :root {
      --primary: #1a2a6c;
      --secondary: #b21f1f;
      --accent: #fdbb2d;
      --dark: #0f172a;
    }

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 100%);
      color: #fff;
      text-align: center;
      padding: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 50px 40px;
      border-radius: 20px;
      max-width: 540px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .check {
      width: 90px;
      height: 90px;
      background: var(--accent);
      color: var(--dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      margin: 0 auto 25px;
      font-weight: bold;
    }

    h1 { margin: 0 0 15px; font-size: 32px; }
    p { font-size: 17px; opacity: 0.95; line-height: 1.6; }

    .btn {
      display: inline-block;
      margin-top: 30px;
      background: var(--accent);
      color: #000;
      padding: 14px 32px;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 800;
      transition: 0.3s;
    }

    .btn:hover { transform: scale(1.05); }

    .contact {
      margin-top: 30px;
      font-size: 15px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>धन्यवाद! / Thank You!</h1>
    <p>तुमचा प्रवेश अर्ज यशस्वीरित्या सादर झाला आहे. आमच्या टीमकडून लवकरच तुमच्याशी संपर्क केला जाईल.</p>
    <p>Your admission application has been submitted successfully. Our team will contact you shortly.</p>
    <a href="index.html" class="btn">मुख्य पानावर जा / Back to Home</a>
    <div class="contact">
      <p>तातडीच्या चौकशीसाठी: 📞 +91 70303 04770</p>
    </div>
  </div>
</body>
</html>
