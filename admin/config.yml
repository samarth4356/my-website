backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "home"
    label: "Home"
    files:
      - file: "content/home.json"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Logo", name: "logo", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Text", name: "text", widget: "string" }
